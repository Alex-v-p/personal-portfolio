name: PR CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: pr-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  nx-affected:
    if: github.event.pull_request.draft == false
    runs-on: windows-latest

    env:
      CI: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: |
            apps/portfolio-api-service/requirements.txt
            apps/assistant-service/requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Create Python virtual environment
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          .\.venv\Scripts\python.exe -m pip install -r apps\portfolio-api-service\requirements.txt
          .\.venv\Scripts\python.exe -m pip install -r apps\assistant-service\requirements.txt
          .\.venv\Scripts\python.exe -m pip install pytest ruff

      - name: Reset Nx daemon/cache
        run: npx nx reset

      - name: Migration smoke check
        shell: pwsh
        run: |
          .\.venv\Scripts\python.exe -m infra.postgres.migrations.cli check

      - name: Show affected projects
        shell: pwsh
        run: |
          npx nx show projects --affected --base="${{ github.event.pull_request.base.sha }}" --head="${{ github.event.pull_request.head.sha }}"

      - name: Lint affected projects
        shell: pwsh
        run: |
          npx nx affected -t lint --base="${{ github.event.pull_request.base.sha }}" --head="${{ github.event.pull_request.head.sha }}"

      - name: Test affected projects
        shell: pwsh
        run: |
          npx nx affected -t test --base="${{ github.event.pull_request.base.sha }}" --head="${{ github.event.pull_request.head.sha }}"

      - name: Build affected projects
        shell: pwsh
        run: |
          npx nx affected -t build --base="${{ github.event.pull_request.base.sha }}" --head="${{ github.event.pull_request.head.sha }}"