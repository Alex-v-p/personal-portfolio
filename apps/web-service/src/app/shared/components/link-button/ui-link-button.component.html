<a
  *ngIf="href; else internalLink"
  [class]="linkClasses"
  [href]="href"
  [attr.target]="openInNewTab ? '_blank' : null"
  [attr.rel]="openInNewTab ? 'noreferrer noopener' : null"
>
  <ng-content></ng-content>
</a>

<ng-template #internalLink>
  <a [class]="linkClasses" [routerLink]="routerLink">
    <ng-content></ng-content>
  </a>
</ng-template>
