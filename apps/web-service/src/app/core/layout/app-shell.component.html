<div class="flex min-h-screen flex-col bg-stone-100 text-stone-900">
  <header *ngIf="!isAdminRoute" [class]="headerClasses">
    <div class="mx-auto flex w-full max-w-6xl items-center justify-between gap-4 rounded-full border border-stone-300 bg-stone-200/90 px-3 py-2 shadow-[0_10px_25px_rgba(40,31,20,0.08)] backdrop-blur">
      <nav class="flex flex-1 flex-wrap items-center gap-2">
        <ng-container *ngFor="let item of quickLinks">
          <a
            *ngIf="!item.isExternal; else externalHeaderLink"
            [routerLink]="item.path"
            routerLinkActive="bg-white text-stone-950 shadow-sm"
            [routerLinkActiveOptions]="{ exact: item.path === '/' }"
            class="inline-flex min-h-10 items-center rounded-full px-4 text-sm font-medium text-stone-600 transition hover:bg-white/80 hover:text-stone-950"
          >
            {{ item.label }}
          </a>
          <ng-template #externalHeaderLink>
            <a
              [href]="item.path"
              target="_blank"
              rel="noreferrer noopener"
              class="inline-flex min-h-10 items-center rounded-full px-4 text-sm font-medium text-stone-600 transition hover:bg-white/80 hover:text-stone-950"
            >
              {{ item.label }}
            </a>
          </ng-template>
        </ng-container>
      </nav>
    </div>
  </header>

  <main class="flex-1 px-4 py-10 sm:px-6 md:py-12 lg:px-8 lg:py-14">
    <div class="mx-auto w-full max-w-6xl">
      <section *ngIf="showRouteSkeleton" aria-label="Loading page content" class="grid min-h-[55vh] gap-6 lg:grid-cols-[minmax(0,1.4fr)_minmax(18rem,0.8fr)]">
        <div class="space-y-5 rounded-[2rem] border border-stone-200 bg-white/80 p-6 shadow-[0_10px_30px_rgba(40,31,20,0.05)]">
          <app-ui-skeleton className="h-8 w-48 rounded-full"></app-ui-skeleton>
          <app-ui-skeleton className="h-14 w-full rounded-[1.75rem]"></app-ui-skeleton>
          <app-ui-skeleton className="h-5 w-4/5 rounded-full"></app-ui-skeleton>
          <div class="grid gap-3 md:grid-cols-2">
            <app-ui-skeleton className="h-40 w-full rounded-[1.75rem]"></app-ui-skeleton>
            <app-ui-skeleton className="h-40 w-full rounded-[1.75rem]"></app-ui-skeleton>
          </div>
        </div>

        <div class="space-y-4 rounded-[2rem] border border-stone-200 bg-white/70 p-6 shadow-[0_10px_30px_rgba(40,31,20,0.04)]">
          <app-ui-skeleton className="h-6 w-32 rounded-full"></app-ui-skeleton>
          <app-ui-skeleton className="h-24 w-full rounded-[1.5rem]"></app-ui-skeleton>
          <app-ui-skeleton className="h-24 w-full rounded-[1.5rem]"></app-ui-skeleton>
          <app-ui-skeleton className="h-12 w-40 rounded-full"></app-ui-skeleton>
        </div>
      </section>

      <router-outlet (activate)="onRouteActivate()" (deactivate)="onRouteDeactivate()"></router-outlet>
    </div>
  </main>

  <div *ngIf="!isAdminRoute" [class]="assistantButtonClasses">
    <div *ngIf="isAssistantOpen" class="mb-4 w-[min(36rem,calc(100vw-1.5rem))] sm:w-[32rem] lg:w-[34rem]">
      <app-assistant-panel mode="widget" (close)="closeAssistant()"></app-assistant-panel>
    </div>

    <button type="button" (click)="toggleAssistant()" [attr.aria-expanded]="isAssistantOpen" aria-label="Toggle portfolio assistant" class="inline-flex items-center gap-3 rounded-[1.75rem] border border-stone-300 bg-white/95 px-4 py-3 shadow-[0_20px_40px_rgba(40,31,20,0.16)] backdrop-blur transition hover:-translate-y-0.5 hover:border-stone-400 hover:bg-white focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-stone-400">
      <span class="inline-flex h-10 w-10 items-center justify-center rounded-full bg-stone-900 text-sm font-semibold text-white">AI</span>
      <span class="pr-1 text-sm font-semibold text-stone-900">{{ isAssistantOpen ? 'Close assistant' : 'Assistant' }}</span>
    </button>
  </div>

  <footer *ngIf="!isAdminRoute" class="mt-16 border-t border-stone-300 bg-stone-200/70 px-4 py-10 sm:px-6 lg:px-8">
    <div class="mx-auto grid w-full max-w-6xl gap-8 md:grid-cols-[1.35fr_0.8fr_0.8fr_1fr]">
      <section class="space-y-3">
        <div class="flex items-center gap-3">
          <img *ngIf="profile.avatarUrl; else avatarFallback" [src]="profile.avatarUrl" [alt]="profile.name || 'Profile avatar'" class="h-10 w-10 rounded-md object-cover" />
          <ng-template #avatarFallback>
            <span class="h-10 w-10 rounded-md bg-stone-500"></span>
          </ng-template>
          <div>
            <p class="text-sm font-semibold text-stone-950">{{ profile.name }}</p>
            <p class="text-xs text-stone-600">{{ profile.role }} portfolio</p>
          </div>
        </div>
        <p class="max-w-sm text-sm leading-6 text-stone-600">{{ profile.footerDescription || shellData?.footerText }}</p>
        <p class="text-sm text-stone-600">{{ profile.location }}</p>
      </section>

      <section class="space-y-3">
        <p class="text-sm font-semibold text-stone-950">Quick Links</p>
        <div class="grid gap-2 text-sm text-stone-600">
          <ng-container *ngFor="let item of footerLinks">
            <a *ngIf="!item.isExternal; else footerExternalLink" [routerLink]="item.path" class="transition hover:text-stone-950">{{ item.label }}</a>
            <ng-template #footerExternalLink>
              <a [href]="item.path" target="_blank" rel="noreferrer noopener" class="transition hover:text-stone-950">{{ item.label }}</a>
            </ng-template>
          </ng-container>
        </div>
      </section>

      <section class="space-y-3">
        <p class="text-sm font-semibold text-stone-950">Resources</p>
        <div class="grid gap-2 text-sm text-stone-600">
          <a
            *ngFor="let item of resources"
            [href]="item.href"
            target="_blank"
            rel="noreferrer noopener"
            class="transition hover:text-stone-950"
          >
            {{ item.label }}
          </a>
        </div>
      </section>

      <section class="space-y-3">
        <p class="text-sm font-semibold text-stone-950">Get in touch</p>
        <a *ngIf="primaryEmail" [href]="'mailto:' + primaryEmail" class="text-sm text-stone-600 transition hover:text-stone-950">{{ primaryEmail }}</a>
        <div class="flex gap-2">
          <a
            *ngFor="let item of socialLinks"
            [href]="item.href"
            target="_blank"
            rel="noreferrer noopener"
            [attr.aria-label]="item.label"
            class="inline-flex h-9 w-9 items-center justify-center rounded-md bg-stone-500 text-xs font-semibold text-white transition hover:bg-stone-700"
          >
            {{ item.mark }}
          </a>
        </div>
      </section>
    </div>
  </footer>
</div>
