<section class="grid items-center gap-10 lg:grid-cols-[1.05fr_0.95fr] lg:gap-14">
  <div class="space-y-6">
    <div class="space-y-3">
      <span class="ui-pill px-3 py-1 text-xs">{{ profile.location }}</span>
      <p class="text-sm font-medium ui-text-soft">{{ profile.greeting }}</p>
      <h1 class="ui-title-display max-w-xl leading-tight">
        {{ profile.heroTitle }}
      </h1>
      <p class="max-w-2xl text-base leading-7 ui-text-muted">
        {{ profile.summary }}
      </p>
    </div>

    <div class="space-y-3">
      <p class="text-sm font-semibold ui-text-muted">My Skills:</p>
      <div class="flex flex-wrap gap-2">
        <app-ui-chip *ngFor="let skill of profile.skills">{{ skill }}</app-ui-chip>
      </div>
    </div>

    <div class="flex flex-wrap gap-2">
      <app-ui-chip *ngFor="let label of profile.availability" tone="accent">{{ label }}</app-ui-chip>
    </div>

    <div class="flex flex-wrap gap-3">
      <app-ui-link-button
        *ngFor="let action of profile.heroActions"
        [appearance]="action.appearance"
        [href]="action.href ?? null"
        [routerLink]="action.routerLink ?? '/'"
        [openInNewTab]="action.openInNewTab ?? false"
      >
        {{ action.label }}
      </app-ui-link-button>
    </div>
  </div>

  <div class="mx-auto w-full max-w-md">
    <div class="ui-media-frame ui-floating-media relative mx-auto aspect-[4/5] w-full max-w-sm overflow-hidden rounded-[1.75rem]">
      <img *ngIf="profile.heroImageUrl || profile.avatarUrl; else heroFallback" [src]="profile.heroImageUrl || profile.avatarUrl" [alt]="profile.name || 'Profile image'" class="absolute inset-0 h-full w-full object-cover" />
      <ng-template #heroFallback>
        <div class="ui-media-placeholder absolute inset-4 rounded-[1.4rem] border" style="border-color: var(--ui-border-strong);"></div>
        <div class="absolute inset-x-8 bottom-8 top-8 rounded-[1.2rem] border border-dashed" style="border-color: rgba(120, 113, 108, 0.35); background: rgba(255, 255, 255, 0.2);"></div>
      </ng-template>
      <div class="ui-glass-badge absolute left-8 top-8 rounded-full px-3 py-1 text-xs font-semibold">
        {{ profile.firstName }} {{ profile.lastName }}
      </div>
      <div class="ui-glass-badge absolute bottom-8 left-8 right-8 rounded-3xl p-4">
        <p class="text-sm font-semibold ui-text-strong">{{ profile.headline }}</p>
        <p class="mt-1 text-xs leading-5 ui-text-muted">{{ profile.shortBio }}</p>
      </div>
    </div>

    <div class="mt-6 flex justify-end gap-3">
      <a *ngIf="profile.resumeUrl" [href]="profile.resumeUrl" target="_blank" rel="noreferrer noopener" class="ui-pill h-10 min-w-10 justify-center rounded-md px-3 text-xs">CV</a>
      <span class="ui-pill h-10 w-10 justify-center rounded-md text-xs">UX</span>
    </div>
  </div>
</section>
