<section class="space-y-6">
  <div *ngIf="profile.introParagraphs.length" class="space-y-4 xl:hidden">
    <p *ngFor="let paragraph of profile.introParagraphs" class="text-sm leading-7 text-stone-600">
      {{ paragraph }}
    </p>

    <div class="flex flex-wrap gap-3 pt-1">
      <app-ui-link-button routerLink="/contact">Contact Me</app-ui-link-button>
      <app-ui-link-button routerLink="/projects" appearance="ghost">View Projects</app-ui-link-button>
    </div>
  </div>

  <app-ui-section-title title="Expertise" description=""></app-ui-section-title>

  <div class="pt-4 space-y-3">
    <app-ui-card *ngFor="let group of groups" class="block">
      <div class="grid gap-4 sm:grid-cols-[auto_1fr] sm:items-start">
        <span class="inline-flex h-10 w-10 items-center justify-center rounded-md bg-stone-300 text-xs font-semibold text-stone-600">
          {{ group.title.slice(0, 2).toUpperCase() }}
        </span>

        <div class="space-y-3">
          <h3 class="text-xl font-semibold text-stone-950">{{ group.title }}</h3>
          <div class="flex flex-wrap gap-2">
            <app-highlight-chip *ngFor="let tag of group.tags" [label]="tag"></app-highlight-chip>
          </div>
        </div>
      </div>
    </app-ui-card>
  </div>
</section>
