<section class="space-y-6">
  <app-ui-section-title title="Expertise" description=""></app-ui-section-title>

  <div class="pt-4 space-y-3">
    <app-ui-card *ngFor="let group of groups" class="block">
      <div class="grid gap-4 sm:grid-cols-[auto_1fr] sm:items-start">
        <span class="inline-flex h-10 w-10 items-center justify-center rounded-md bg-stone-300 text-xs font-semibold text-stone-600">
          {{ group.title.slice(0, 2).toUpperCase() }}
        </span>

        <div class="space-y-3">
          <h3 class="text-xl font-semibold text-stone-950">{{ group.title }}</h3>
          <div class="flex flex-wrap gap-2">
            <app-ui-chip *ngFor="let tag of group.tags">{{ tag }}</app-ui-chip>
          </div>
        </div>
      </div>
    </app-ui-card>
  </div>
</section>
