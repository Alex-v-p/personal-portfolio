<section class="space-y-8">
  <div class="space-y-4">
    <p *ngFor="let paragraph of profile.introParagraphs" class="text-sm leading-7 text-stone-600">
      {{ paragraph }}
    </p>

    <div class="flex flex-wrap gap-3 pt-1">
      <app-ui-link-button routerLink="/contact">Contact Me</app-ui-link-button>
      <app-ui-link-button routerLink="/projects" appearance="ghost">View Projects</app-ui-link-button>
    </div>
  </div>

  <div class="space-y-6">
    <app-ui-section-title title="Experience" description="A timeline preview of education, internships, and independent project work."></app-ui-section-title>

    <div class="relative space-y-4 pl-6 before:absolute before:bottom-2 before:left-[11px] before:top-2 before:w-px before:bg-stone-400/70">
      <div *ngFor="let item of experiences" class="relative">
        <span class="absolute -left-6 top-7 h-3 w-3 rounded-full bg-stone-500"></span>

        <app-ui-card>
          <div class="flex gap-4">
            <img *ngIf="item.logoUrl; else experienceMark" [src]="item.logoUrl" [alt]="item.organizationName" class="mt-1 h-12 w-12 shrink-0 rounded-2xl object-cover" />
            <ng-template #experienceMark>
              <span class="mt-1 inline-flex h-12 w-12 shrink-0 items-center justify-center rounded-2xl bg-stone-300 text-xs font-semibold text-stone-600">
                {{ item.organizationName.slice(0, 2).toUpperCase() }}
              </span>
            </ng-template>

            <div class="min-w-0 space-y-3">
              <div class="space-y-1">
                <div class="flex flex-wrap items-center gap-2">
                  <h3 class="text-lg font-semibold text-stone-950">{{ item.title }}</h3>
                  <span class="text-xs text-stone-500">{{ item.location }}</span>
                </div>
                <p class="text-xs text-stone-500">{{ item.period }}</p>
              </div>

              <p class="text-sm leading-6 text-stone-600">{{ item.summary }}</p>

              <div class="flex flex-wrap gap-2">
                <app-ui-chip *ngFor="let skill of item.skillNames">{{ skill }}</app-ui-chip>
              </div>
            </div>
          </div>
        </app-ui-card>
      </div>
    </div>
  </div>
</section>
