<div class="space-y-6">
  <header class="rounded-[2rem] border border-stone-300 bg-white p-6 shadow-[0_20px_45px_rgba(40,31,20,0.08)] sm:p-8">
    <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
      <div class="space-y-3">
        <p class="text-xs font-semibold uppercase tracking-[0.22em] text-stone-500">Admin / Media</p>
        <h2 class="text-2xl font-semibold text-stone-950">Media library</h2>
        <p class="max-w-3xl text-sm leading-6 text-stone-600">
          The media manager now loads on its own route and owns its own filtering, selection, and deletion workflow instead of depending on shared shell state.
        </p>
      </div>
      <button type="button" (click)="reload()" class="inline-flex min-h-11 items-center rounded-full border border-stone-300 bg-white px-4 text-sm font-semibold text-stone-800 transition hover:border-stone-400 hover:bg-stone-50">Refresh media library</button>
    </div>

    <div *ngIf="statusMessage" class="mt-5 rounded-2xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-700">{{ statusMessage }}</div>
    <div *ngIf="errorMessage" class="mt-5 rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700">{{ errorMessage }}</div>
  </header>

  <section *ngIf="isLoading" class="rounded-[2rem] border border-stone-300 bg-white p-6 text-sm text-stone-600 shadow-[0_20px_45px_rgba(40,31,20,0.08)]">Loading media library…</section>

  <app-admin-media-tab
    *ngIf="!isLoading && !errorMessage"
    [dashboard]="dashboard"
    [imageMediaCount]="imageMediaCount"
    [documentMediaCount]="documentMediaCount"
    [filteredMediaCount]="filteredMediaCount"
    [mediaSearchTerm]="mediaSearchTerm"
    [mediaVisibilityFilter]="mediaVisibilityFilter"
    [mediaKindFilter]="mediaKindFilter"
    [mediaFolderFilter]="mediaFolderFilter"
    [mediaFolderOptions]="mediaFolderOptions"
    [filteredMediaFiles]="filteredMediaFiles"
    [selectedMediaFileId]="selectedMediaFileId"
    [selectedMediaFile]="selectedMediaFile"
    [deletingMediaFileIds]="deletingMediaFileIds"
    (mediaSearchTermChange)="mediaSearchTerm = $event"
    (mediaVisibilityFilterChange)="mediaVisibilityFilter = $event"
    (mediaKindFilterChange)="mediaKindFilter = $event"
    (mediaFolderFilterChange)="mediaFolderFilter = $event"
    (resetFilters)="clearMediaFilters()"
    (mediaSelected)="selectMediaFile($event)"
    (deleteSelectedMedia)="deleteSelectedMediaFile()">
  </app-admin-media-tab>
</div>
