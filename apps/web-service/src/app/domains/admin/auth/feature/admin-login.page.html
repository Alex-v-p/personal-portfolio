<div class="mx-auto flex min-h-[70vh] max-w-5xl items-center justify-center">
  <section class="w-full max-w-md rounded-[2rem] border border-stone-300 bg-white p-8 shadow-[0_24px_60px_rgba(40,31,20,0.12)]">
    <div class="space-y-3 text-center">
      <p class="text-xs font-semibold uppercase tracking-[0.22em] text-stone-500">Stage 10</p>
      <h1 class="text-3xl font-semibold text-stone-950">Admin CMS login</h1>
      <p class="text-sm leading-6 text-stone-600">
        Sign in to manage projects, blog posts, profile content, and contact messages.
      </p>
    </div>

    <form class="mt-8 space-y-5" (ngSubmit)="submit()">
      <label class="block space-y-2">
        <span class="text-sm font-semibold text-stone-800">Email</span>
        <input
          [(ngModel)]="email"
          name="email"
          type="email"
          required
          class="w-full rounded-2xl border border-stone-300 bg-stone-50 px-4 py-3 text-sm text-stone-800 outline-none transition focus:border-stone-500"
        />
      </label>

      <label class="block space-y-2">
        <span class="text-sm font-semibold text-stone-800">Password</span>
        <input
          [(ngModel)]="password"
          name="password"
          type="password"
          required
          class="w-full rounded-2xl border border-stone-300 bg-stone-50 px-4 py-3 text-sm text-stone-800 outline-none transition focus:border-stone-500"
        />
      </label>

      <p *ngIf="errorMessage" class="rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700">
        {{ errorMessage }}
      </p>

      <button
        type="submit"
        [disabled]="isSubmitting"
        class="inline-flex min-h-12 w-full items-center justify-center rounded-full bg-stone-900 px-5 py-3 text-sm font-semibold text-white transition hover:bg-stone-700 disabled:cursor-not-allowed disabled:bg-stone-400"
      >
        {{ isSubmitting ? 'Signing in…' : 'Sign in to the CMS' }}
      </button>
    </form>
  </section>
</div>
