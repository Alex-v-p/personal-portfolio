<div class="space-y-5 2xl:space-y-6">
  <header class="rounded-[2rem] border border-stone-300 bg-white p-6 shadow-[0_20px_45px_rgba(40,31,20,0.08)] sm:p-8 lg:px-10 lg:py-8">
    <div class="grid gap-5 xl:grid-cols-[minmax(0,1fr)_auto] xl:items-start">
      <div class="space-y-3">
        <p class="text-xs font-semibold uppercase tracking-[0.22em] text-stone-500">Portfolio CMS</p>
        <h1 class="text-3xl font-semibold text-stone-950">Content management</h1>
        <p class="max-w-3xl text-sm leading-6 text-stone-600">
          Manage portfolio content, supporting data, and operational tools from one workspace.
        </p>
      </div>

      <div class="flex flex-wrap items-center gap-3 xl:justify-end">
        <div class="rounded-full border border-stone-300 bg-stone-50 px-4 py-2 text-sm text-stone-700">
          Signed in as <span class="font-semibold text-stone-950">{{ adminDisplayName }}</span>
        </div>
        <button type="button" (click)="logout()" class="inline-flex min-h-11 items-center rounded-full bg-stone-900 px-5 text-sm font-semibold text-white transition hover:bg-stone-700">Sign out</button>
      </div>
    </div>
  </header>

  <app-admin-shell-nav></app-admin-shell-nav>

  <router-outlet></router-outlet>
</div>
