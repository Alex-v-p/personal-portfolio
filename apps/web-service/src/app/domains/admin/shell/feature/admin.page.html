<div class="space-y-8">
  <header *ngIf="!compactMode" class="rounded-[2rem] border border-stone-300 bg-white p-6 shadow-[0_20px_45px_rgba(40,31,20,0.08)] sm:p-8">
    <div class="flex flex-col gap-6 lg:flex-row lg:items-center lg:justify-between">
      <div class="space-y-3">
        <p class="text-xs font-semibold uppercase tracking-[0.22em] text-stone-500">Portfolio CMS</p>
        <h1 class="text-3xl font-semibold text-stone-950">Content management</h1>
        <p class="max-w-3xl text-sm leading-6 text-stone-600">
          Manage the remaining legacy admin areas while more operational workspaces continue moving onto dedicated routes.
        </p>
      </div>
      <div class="flex flex-wrap items-center gap-3">
        <div class="rounded-full border border-stone-300 bg-stone-50 px-4 py-2 text-sm text-stone-700">
          Signed in as <span class="font-semibold text-stone-950">{{ adminDisplayName }}</span>
        </div>
        <button type="button" (click)="loadCms()" class="inline-flex min-h-11 items-center rounded-full border border-stone-300 bg-white px-4 text-sm font-semibold text-stone-800 transition hover:border-stone-400 hover:bg-stone-50">Refresh</button>
        <button type="button" (click)="logout()" class="inline-flex min-h-11 items-center rounded-full bg-stone-900 px-5 text-sm font-semibold text-white transition hover:bg-stone-700">Sign out</button>
      </div>
    </div>

    <div *ngIf="statusMessage" class="mt-5 rounded-2xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-700">{{ statusMessage }}</div>
    <div *ngIf="errorMessage" class="mt-5 rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700">{{ errorMessage }}</div>
  </header>

  <section *ngIf="isLoading" class="rounded-[2rem] border border-stone-300 bg-white p-6 text-sm text-stone-600 shadow-[0_20px_45px_rgba(40,31,20,0.08)]">Loading admin CMS data…</section>

  <ng-container *ngIf="!isLoading && !errorMessage">
    <nav *ngIf="!compactMode" class="flex flex-wrap gap-3 rounded-[2rem] border border-stone-300 bg-white p-4 shadow-[0_20px_45px_rgba(40,31,20,0.08)]">
      <button *ngFor="let tab of tabs" type="button" (click)="setActiveTab(tab.id)" [ngClass]="tab.id === activeTab ? 'bg-stone-900 text-white' : 'bg-stone-100 text-stone-700 hover:bg-stone-200'" class="inline-flex min-h-11 items-center rounded-full px-4 text-sm font-semibold transition">{{ tab.label }}</button>
    </nav>

    <app-admin-projects-tab
      *ngIf="activeTab === 'projects'"
      [projects]="projects"
      [selectedProjectId]="selectedProjectId"
      [projectForm]="projectForm"
      [projectUploadForm]="projectUploadForm"
      [referenceData]="referenceData"
      [uploadInProgressKey]="uploadInProgressKey"
      (projectSelected)="selectProject($event)"
      (newProjectStarted)="startNewProject()"
      (projectSkillToggled)="toggleProjectSkill($event)"
      (projectSaved)="saveProject()"
      (projectDeleted)="deleteProject()"
      (scopedFileSelected)="onScopedFileSelected($event.event, $event.form)"
      (projectCoverUploadRequested)="uploadProjectCover()">
    </app-admin-projects-tab>

    <app-admin-taxonomy-tab
      *ngIf="activeTab === 'taxonomy'"
      [referenceData]="referenceData"
      [selectedSkillCategoryId]="selectedSkillCategoryId"
      [selectedSkillId]="selectedSkillId"
      [selectedBlogTagId]="selectedBlogTagId"
      [skillCategoryForm]="skillCategoryForm"
      [skillForm]="skillForm"
      [blogTagForm]="blogTagForm"
      (skillCategorySelected)="selectSkillCategory($event)"
      (newSkillCategoryStarted)="startNewSkillCategory()"
      (skillCategorySaved)="saveSkillCategory()"
      (skillCategoryDeleted)="deleteSkillCategory()"
      (skillSelected)="selectSkill($event)"
      (newSkillStarted)="startNewSkill()"
      (skillSaved)="saveSkill()"
      (skillDeleted)="deleteSkill()"
      (blogTagSelected)="selectBlogTag($event)"
      (newBlogTagStarted)="startNewBlogTag()"
      (blogTagSaved)="saveBlogTag()"
      (blogTagDeleted)="deleteBlogTag()">
    </app-admin-taxonomy-tab>

    <app-admin-experience-tab
      *ngIf="activeTab === 'experience'"
      [experiences]="experiences"
      [selectedExperienceId]="selectedExperienceId"
      [experienceForm]="experienceForm"
      [skills]="referenceData.skills"
      [mediaFiles]="referenceData.mediaFiles"
      [experienceUploadForm]="experienceUploadForm"
      [uploadInProgressKey]="uploadInProgressKey"
      (experienceSelected)="selectExperience($event)"
      (newExperienceStarted)="startNewExperience()"
      (experienceSkillToggled)="toggleExperienceSkill($event)"
      (experienceSaved)="saveExperience()"
      (experienceDeleted)="deleteExperience()"
      (scopedFileSelected)="onScopedFileSelected($event.event, $event.form)"
      (experienceLogoUploadRequested)="uploadExperienceLogo()">
    </app-admin-experience-tab>

    <app-admin-navigation-tab
      *ngIf="activeTab === 'navigation'"
      [navigationItems]="navigationItems"
      [selectedNavigationItemId]="selectedNavigationItemId"
      [navigationItemForm]="navigationItemForm"
      (navigationItemSelected)="selectNavigationItem($event)"
      (newNavigationItemStarted)="startNewNavigationItem()"
      (navigationItemSaved)="saveNavigationItem()"
      (navigationItemDeleted)="deleteNavigationItem()">
    </app-admin-navigation-tab>




    <app-admin-admins-tab
      *ngIf="activeTab === 'admins'"
      [adminUsers]="adminUsers"
      [selectedAdminUserId]="selectedAdminUserId"
      [currentAdminId]="currentAdminId"
      [adminUserForm]="adminUserForm"
      (adminUserSelected)="selectAdminUser($event)"
      (newAdminUserStarted)="startNewAdminUser()"
      (adminUserSaved)="saveAdminUser()"
      (adminUserDeleted)="deleteAdminUser()">
    </app-admin-admins-tab>
  </ng-container>
</div>
