    <section class="grid gap-6 xl:grid-cols-[20rem_minmax(0,1fr)]">
      <aside class="rounded-[2rem] border border-stone-300 bg-white p-5 shadow-[0_20px_45px_rgba(40,31,20,0.08)]">
        <div class="flex items-start justify-between gap-4">
          <div>
            <h2 class="text-lg font-semibold text-stone-950">Admin users</h2>
            <p class="mt-1 text-sm text-stone-600">These accounts can sign into the CMS and manage portfolio content.</p>
          </div>
          <button type="button" (click)="startNewAdminUser()" class="rounded-full bg-stone-900 px-4 py-2 text-sm font-semibold text-white">New</button>
        </div>

        <div class="mt-4 grid gap-2 max-h-[42rem] overflow-y-auto">
          <button *ngFor="let user of adminUsers" type="button" (click)="selectAdminUser(user.id)" [ngClass]="user.id === selectedAdminUserId ? 'border-stone-900 bg-stone-100' : 'border-stone-200 bg-stone-50'" class="rounded-2xl border px-4 py-3 text-left text-sm">
            <div class="font-semibold">{{ user.displayName }}</div>
            <div class="text-xs text-stone-500">{{ user.email }}</div>
          </button>
        </div>
      </aside>

      <article class="rounded-[2rem] border border-stone-300 bg-white p-6 shadow-[0_20px_45px_rgba(40,31,20,0.08)] sm:p-8">
        <div class="flex flex-wrap items-center justify-between gap-3">
          <div>
            <h2 class="text-xl font-semibold text-stone-950">{{ selectedAdminUserId ? 'Edit admin user' : 'Create admin user' }}</h2>
            <p class="text-sm text-stone-600">Create another CMS login or update an existing one. Passwords can be rotated here without touching the database manually.</p>
          </div>
          <button *ngIf="selectedAdminUserId && selectedAdminUserId !== currentAdminId" type="button" (click)="deleteAdminUser()" class="rounded-full border border-rose-300 px-4 py-2 text-sm font-semibold text-rose-700">Delete admin user</button>
        </div>

        <div class="mt-6 grid gap-5 lg:grid-cols-2">
          <label class="space-y-2"><span class="text-sm font-semibold text-stone-800">Email address</span><p class="text-xs leading-5 text-stone-500">Used as the login identifier when signing into the CMS.</p><input [(ngModel)]="adminUserForm.email" name="adminUserEmail" placeholder="admin@example.com" class="w-full rounded-2xl border border-stone-300 bg-stone-50 px-4 py-3 text-sm" /></label>
          <label class="space-y-2"><span class="text-sm font-semibold text-stone-800">Display name</span><p class="text-xs leading-5 text-stone-500">Friendly name shown in the CMS header and user list.</p><input [(ngModel)]="adminUserForm.displayName" name="adminUserDisplayName" placeholder="Site administrator" class="w-full rounded-2xl border border-stone-300 bg-stone-50 px-4 py-3 text-sm" /></label>
          <label class="space-y-2 lg:col-span-2"><span class="text-sm font-semibold text-stone-800">Password</span><p class="text-xs leading-5 text-stone-500">When editing an existing account, leave this blank to keep the current password unchanged.</p><input [(ngModel)]="adminUserForm.password" name="adminUserPassword" type="password" placeholder="Create or replace the password" class="w-full rounded-2xl border border-stone-300 bg-stone-50 px-4 py-3 text-sm" /></label>
          <label class="flex items-start gap-3 rounded-2xl border border-stone-200 bg-stone-50 px-4 py-3 text-sm text-stone-800 lg:col-span-2"><input [(ngModel)]="adminUserForm.isActive" name="adminUserActive" type="checkbox" class="mt-1 h-4 w-4" /><span><span class="font-semibold text-stone-900">Active account</span><span class="mt-1 block text-xs leading-5 text-stone-500">Disable this if the admin should keep their record but no longer be able to sign in.</span></span></label>
        </div>

        <div class="mt-6 flex flex-wrap items-center justify-end gap-3">
          <button type="button" (click)="startNewAdminUser()" class="rounded-full border border-stone-300 px-4 py-2 text-sm font-semibold text-stone-700">Reset form</button>
          <button type="button" (click)="saveAdminUser()" class="rounded-full bg-stone-900 px-5 py-2 text-sm font-semibold text-white">Save admin user</button>
        </div>
      </article>
    </section>
