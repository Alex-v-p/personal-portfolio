<div class="space-y-6">
  <header class="rounded-[2rem] border border-stone-300 bg-white p-6 shadow-[0_20px_45px_rgba(40,31,20,0.08)] sm:p-8">
    <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
      <div class="space-y-3">
        <p class="text-xs font-semibold uppercase tracking-[0.22em] text-stone-500">Admin / Messages</p>
        <h2 class="text-2xl font-semibold text-stone-950">Contact inbox</h2>
        <p class="max-w-3xl text-sm leading-6 text-stone-600">
          This page is the first migrated admin feature. It owns its own loading, filters, optimistic update flow, and route instead of relying on the legacy admin shell state.
        </p>
      </div>
      <button type="button" (click)="reload()" class="inline-flex min-h-11 items-center rounded-full border border-stone-300 bg-white px-4 text-sm font-semibold text-stone-800 transition hover:border-stone-400 hover:bg-stone-50">Refresh inbox</button>
    </div>

    <div *ngIf="statusMessage" class="mt-5 rounded-2xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-700">{{ statusMessage }}</div>
    <div *ngIf="errorMessage" class="mt-5 rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700">{{ errorMessage }}</div>
  </header>

  <section *ngIf="isLoading" class="rounded-[2rem] border border-stone-300 bg-white p-6 text-sm text-stone-600 shadow-[0_20px_45px_rgba(40,31,20,0.08)]">Loading contact messages…</section>

  <app-admin-messages-tab
    *ngIf="!isLoading && !errorMessage"
    [messageSearchTerm]="messageSearchTerm"
    [messageStatusFilter]="messageStatusFilter"
    [messageSourceFilter]="messageSourceFilter"
    [messageSourceOptions]="messageSourceOptions"
    [filteredMessages]="filteredMessages"
    [filteredMessageCount]="filteredMessageCount"
    [unreadFilteredMessageCount]="unreadFilteredMessageCount"
    [updatingMessageIds]="updatingMessageIds"
    (messageSearchTermChange)="messageSearchTerm = $event"
    (messageStatusFilterChange)="messageStatusFilter = $event"
    (messageSourceFilterChange)="messageSourceFilter = $event"
    (messageReadToggleRequested)="toggleMessageRead($event)">
  </app-admin-messages-tab>
</div>
