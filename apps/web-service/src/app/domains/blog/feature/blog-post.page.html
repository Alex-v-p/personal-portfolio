<div class="mx-auto max-w-4xl space-y-8">
  <app-ui-link-button routerLink="/blog" appearance="ghost">{{ 'pages.blogPost.back' | translate }}</app-ui-link-button>

  <section *ngIf="isLoading" class="space-y-6" [attr.aria-label]="'pages.blogPost.loading' | translate">
    <app-ui-skeleton className="h-6 w-32 rounded-full"></app-ui-skeleton>
    <div class="space-y-4">
      <app-ui-skeleton className="h-12 w-full max-w-3xl rounded-3xl"></app-ui-skeleton>
      <app-ui-skeleton className="h-5 w-full max-w-2xl rounded-full"></app-ui-skeleton>
      <app-ui-skeleton className="h-5 w-4/5 rounded-full"></app-ui-skeleton>
    </div>
    <app-ui-skeleton className="h-[22rem] w-full rounded-[2rem]"></app-ui-skeleton>
    <div class="space-y-3">
      <app-ui-skeleton className="h-4 w-[92%] rounded-full"></app-ui-skeleton>
      <app-ui-skeleton className="h-4 w-[88%] rounded-full"></app-ui-skeleton>
      <app-ui-skeleton className="h-4 w-[90%] rounded-full"></app-ui-skeleton>
      <app-ui-skeleton className="h-4 w-[82%] rounded-full"></app-ui-skeleton>
    </div>
  </section>

  <app-ui-empty-state
    *ngIf="!isLoading && errorMessage"
    [title]="'pages.blogPost.empty.loadTitle' | translate"
    [description]="errorMessage"
    [hasActions]="true"
    tone="error"
  >
    <div actions>
      <app-ui-button appearance="secondary" type="button" (click)="retry()">{{ 'common.actions.retry' | translate }}</app-ui-button>
    </div>
  </app-ui-empty-state>

  <article *ngIf="!isLoading && post" class="space-y-6">
    <header class="space-y-4">
      <div class="ui-meta-row flex flex-wrap items-center gap-3">
        <span>{{ post.category }}</span>
        <span>{{ post.publishedAt }}</span>
        <span>{{ post.readTime }}</span>
      </div>

      <div class="space-y-3">
        <h1 class="m-0 text-4xl font-semibold tracking-tight ui-text-strong sm:text-5xl">{{ post.title }}</h1>
        <p class="max-w-3xl text-sm leading-7 ui-text-muted">{{ post.excerpt }}</p>
      </div>

      <div class="flex flex-wrap gap-2">
        <app-highlight-chip *ngFor="let tag of post.tags" [label]="tag"></app-highlight-chip>
      </div>

      <div class="flex items-center gap-3 text-sm ui-text-muted">
        <span>{{ 'pages.blogPost.share' | translate }}</span>
        <span
          *ngFor="let mark of shareMarks"
          class="ui-pill h-8 w-8 justify-center rounded-sm px-0 text-xs font-semibold uppercase"
        >
          {{ mark }}
        </span>
      </div>
    </header>

    <div class="ui-panel overflow-hidden rounded-[1.5rem]">
      <div *ngIf="post.coverImageUrl; else postCoverFallback" class="overflow-hidden border-b" style="border-color: var(--ui-border);">
        <img [src]="post.coverImageUrl" [alt]="post.coverImageAlt" class="max-h-[32rem] w-full object-cover" />
      </div>
      <ng-template #postCoverFallback>
        <div class="ui-media-placeholder flex min-h-[21rem] items-end p-6 text-xs font-semibold uppercase tracking-[0.16em] ui-text-muted sm:p-8">
          <span class="max-w-[18ch]">{{ post.coverImageAlt }}</span>
        </div>
      </ng-template>

      <div class="px-6 py-8 sm:px-8">
        <div class="blog-markdown" [innerHTML]="renderedContent"></div>
      </div>
    </div>
  </article>
</div>
