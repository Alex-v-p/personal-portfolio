<div class="space-y-8">
  <header class="rounded-[2rem] border border-stone-300 bg-white p-6 shadow-[0_20px_45px_rgba(40,31,20,0.08)] sm:p-8">
    <div class="flex flex-col gap-6 lg:flex-row lg:items-center lg:justify-between">
      <div class="space-y-3">
        <p class="text-xs font-semibold uppercase tracking-[0.22em] text-stone-500">Portfolio CMS</p>
        <h1 class="text-3xl font-semibold text-stone-950">Content management</h1>
        <p class="max-w-3xl text-sm leading-6 text-stone-600">
          Manage projects, blog posts, taxonomy, experience, navigation, profile content, GitHub stats, admin users, and uploaded media.
        </p>
      </div>
      <div class="flex flex-wrap items-center gap-3">
        <div class="rounded-full border border-stone-300 bg-stone-50 px-4 py-2 text-sm text-stone-700">
          Signed in as <span class="font-semibold text-stone-950">{{ adminDisplayName }}</span>
        </div>
        <button type="button" (click)="loadCms()" class="inline-flex min-h-11 items-center rounded-full border border-stone-300 bg-white px-4 text-sm font-semibold text-stone-800 transition hover:border-stone-400 hover:bg-stone-50">Refresh</button>
        <button type="button" (click)="logout()" class="inline-flex min-h-11 items-center rounded-full bg-stone-900 px-5 text-sm font-semibold text-white transition hover:bg-stone-700">Sign out</button>
      </div>
    </div>

    <div *ngIf="statusMessage" class="mt-5 rounded-2xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-700">{{ statusMessage }}</div>
    <div *ngIf="errorMessage" class="mt-5 rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700">{{ errorMessage }}</div>
  </header>

  <section *ngIf="isLoading" class="rounded-[2rem] border border-stone-300 bg-white p-6 text-sm text-stone-600 shadow-[0_20px_45px_rgba(40,31,20,0.08)]">Loading admin CMS data…</section>

  <ng-container *ngIf="!isLoading && !errorMessage">
    <nav class="flex flex-wrap gap-3 rounded-[2rem] border border-stone-300 bg-white p-4 shadow-[0_20px_45px_rgba(40,31,20,0.08)]">
      <button *ngFor="let tab of tabs" type="button" (click)="setActiveTab(tab.id)" [ngClass]="tab.id === activeTab ? 'bg-stone-900 text-white' : 'bg-stone-100 text-stone-700 hover:bg-stone-200'" class="inline-flex min-h-11 items-center rounded-full px-4 text-sm font-semibold transition">{{ tab.label }}</button>
    </nav>

    <app-admin-overview-tab
      *ngIf="activeTab === 'overview'"
      [dashboard]="dashboard"
      [messages]="messages"
      [mediaFiles]="referenceData.mediaFiles"
      (openTab)="setActiveTab($event)">
    </app-admin-overview-tab>

    <app-admin-media-tab
      *ngIf="activeTab === 'media'"
      [dashboard]="dashboard"
      [imageMediaCount]="imageMediaCount"
      [documentMediaCount]="documentMediaCount"
      [filteredMediaCount]="filteredMediaCount"
      [mediaSearchTerm]="mediaSearchTerm"
      [mediaKindFilter]="mediaKindFilter"
      [mediaVisibilityFilter]="mediaVisibilityFilter"
      [mediaFolderFilter]="mediaFolderFilter"
      [mediaFolderOptions]="mediaFolderOptions"
      [filteredMediaFiles]="filteredMediaFiles"
      [selectedMediaFileId]="selectedMediaFileId"
      [selectedMediaFile]="selectedMediaFile"
      [deletingMediaFileIds]="deletingMediaFileIds"
      (mediaSearchTermChange)="mediaSearchTerm = $event"
      (mediaKindFilterChange)="mediaKindFilter = $event"
      (mediaVisibilityFilterChange)="mediaVisibilityFilter = $event"
      (mediaFolderFilterChange)="mediaFolderFilter = $event"
      (resetFilters)="clearMediaFilters()"
      (mediaSelected)="selectMediaFile($event)"
      (deleteSelectedMedia)="deleteSelectedMediaFile()">
    </app-admin-media-tab>

    <app-admin-projects-tab
      *ngIf="activeTab === 'projects'"
      [projects]="projects"
      [selectedProjectId]="selectedProjectId"
      [projectForm]="projectForm"
      [projectUploadForm]="projectUploadForm"
      [referenceData]="referenceData"
      [uploadInProgressKey]="uploadInProgressKey"
      (projectSelected)="selectProject($event)"
      (newProjectStarted)="startNewProject()"
      (projectSkillToggled)="toggleProjectSkill($event)"
      (projectSaved)="saveProject()"
      (projectDeleted)="deleteProject()"
      (scopedFileSelected)="onScopedFileSelected($event.event, $event.form)"
      (projectCoverUploadRequested)="uploadProjectCover()">
    </app-admin-projects-tab>

    <app-admin-blog-tab
      *ngIf="activeTab === 'blog'"
      [blogPosts]="blogPosts"
      [selectedBlogPostId]="selectedBlogPostId"
      [blogPostForm]="blogPostForm"
      [blogUploadForm]="blogUploadForm"
      [blogInlineImageUploadForm]="blogInlineImageUploadForm"
      [referenceData]="referenceData"
      [uploadInProgressKey]="uploadInProgressKey"
      (blogPostSelected)="selectBlogPost($event)"
      (newBlogPostStarted)="startNewBlogPost()"
      (blogPostSaved)="saveBlogPost()"
      (blogPostDeleted)="deleteBlogPost()"
      (scopedFileSelected)="onScopedFileSelected($event.event, $event.form)"
      (blogCoverUploadRequested)="uploadBlogCover()"
      (blogInlineImageUploadRequested)="uploadBlogInlineImage()"
      (statusMessageSet)="statusMessage = $event">
    </app-admin-blog-tab>

    <app-admin-taxonomy-tab
      *ngIf="activeTab === 'taxonomy'"
      [referenceData]="referenceData"
      [selectedSkillCategoryId]="selectedSkillCategoryId"
      [selectedSkillId]="selectedSkillId"
      [selectedBlogTagId]="selectedBlogTagId"
      [skillCategoryForm]="skillCategoryForm"
      [skillForm]="skillForm"
      [blogTagForm]="blogTagForm"
      (skillCategorySelected)="selectSkillCategory($event)"
      (newSkillCategoryStarted)="startNewSkillCategory()"
      (skillCategorySaved)="saveSkillCategory()"
      (skillCategoryDeleted)="deleteSkillCategory()"
      (skillSelected)="selectSkill($event)"
      (newSkillStarted)="startNewSkill()"
      (skillSaved)="saveSkill()"
      (skillDeleted)="deleteSkill()"
      (blogTagSelected)="selectBlogTag($event)"
      (newBlogTagStarted)="startNewBlogTag()"
      (blogTagSaved)="saveBlogTag()"
      (blogTagDeleted)="deleteBlogTag()">
    </app-admin-taxonomy-tab>

    <app-admin-experience-tab
      *ngIf="activeTab === 'experience'"
      [experiences]="experiences"
      [selectedExperienceId]="selectedExperienceId"
      [experienceForm]="experienceForm"
      [skills]="referenceData.skills"
      [mediaFiles]="referenceData.mediaFiles"
      [experienceUploadForm]="experienceUploadForm"
      [uploadInProgressKey]="uploadInProgressKey"
      (experienceSelected)="selectExperience($event)"
      (newExperienceStarted)="startNewExperience()"
      (experienceSkillToggled)="toggleExperienceSkill($event)"
      (experienceSaved)="saveExperience()"
      (experienceDeleted)="deleteExperience()"
      (scopedFileSelected)="onScopedFileSelected($event.event, $event.form)"
      (experienceLogoUploadRequested)="uploadExperienceLogo()">
    </app-admin-experience-tab>

    <app-admin-navigation-tab
      *ngIf="activeTab === 'navigation'"
      [navigationItems]="navigationItems"
      [selectedNavigationItemId]="selectedNavigationItemId"
      [navigationItemForm]="navigationItemForm"
      (navigationItemSelected)="selectNavigationItem($event)"
      (newNavigationItemStarted)="startNewNavigationItem()"
      (navigationItemSaved)="saveNavigationItem()"
      (navigationItemDeleted)="deleteNavigationItem()">
    </app-admin-navigation-tab>

    <app-admin-profile-tab
      *ngIf="activeTab === 'profile'"
      [profileForm]="profileForm"
      [mediaFiles]="referenceData.mediaFiles"
      [profileAvatarUploadForm]="profileAvatarUploadForm"
      [profileHeroUploadForm]="profileHeroUploadForm"
      [profileResumeUploadForm]="profileResumeUploadForm"
      [uploadInProgressKey]="uploadInProgressKey"
      (socialLinkAdded)="addSocialLink()"
      (socialLinkRemoved)="removeSocialLink($event)"
      (profileSaved)="saveProfile()"
      (scopedFileSelected)="onScopedFileSelected($event.event, $event.form)"
      (profileAvatarUploadRequested)="uploadProfileAvatar()"
      (profileHeroUploadRequested)="uploadProfileHero()"
      (profileResumeUploadRequested)="uploadProfileResume()">
    </app-admin-profile-tab>

    <app-admin-stats-tab
      *ngIf="activeTab === 'stats'"
      [githubSnapshots]="githubSnapshots"
      [selectedGithubSnapshotId]="selectedGithubSnapshotId"
      [githubSnapshotForm]="githubSnapshotForm"
      [isRefreshingGithub]="isRefreshingGithub"
      (githubSnapshotSelected)="selectGithubSnapshot($event)"
      (newGithubSnapshotStarted)="startNewGithubSnapshot()"
      (githubRefreshRequested)="refreshGithubSnapshot()"
      (githubSnapshotSaved)="saveGithubSnapshot()"
      (githubSnapshotDeleted)="deleteGithubSnapshot()">
    </app-admin-stats-tab>

    <app-admin-assistant-tab
      *ngIf="activeTab === 'assistant'"
      [assistantKnowledgeStatus]="assistantKnowledgeStatus"
      [isRebuildingAssistantKnowledge]="isRebuildingAssistantKnowledge"
      (rebuildRequested)="rebuildAssistantKnowledge()">
    </app-admin-assistant-tab>

    <app-admin-activity-tab
      *ngIf="activeTab === 'activity'"
      [siteActivity]="siteActivity"
      [activityVisitorSearchTerm]="activityVisitorSearchTerm"
      [activityVisitorFocus]="activityVisitorFocus"
      [activityTimelineEventFilter]="activityTimelineEventFilter"
      [filteredActivityVisitors]="filteredActivityVisitors"
      [selectedActivityVisitorId]="selectedActivityVisitorId"
      [selectedActivityVisitor]="selectedActivityVisitor"
      [selectedActivityVisits]="selectedActivityVisits"
      [selectedActivityVisitSessionId]="selectedActivityVisitSessionId"
      [selectedActivityVisit]="selectedActivityVisit"
      [selectedActivityEvents]="selectedActivityEvents"
      [selectedActivityConversations]="selectedActivityConversations"
      [selectedActivityEventCount]="selectedActivityEventCount"
      (refreshRequested)="loadCms()"
      (activityVisitorSearchTermChange)="activityVisitorSearchTerm = $event"
      (activityVisitorFocusChange)="activityVisitorFocus = $event"
      (activityTimelineEventFilterChange)="activityTimelineEventFilter = $event"
      (filtersChanged)="onActivityFiltersChanged()"
      (activityVisitorSelected)="selectActivityVisitor($event)"
      (activityVisitSelected)="selectActivityVisit($event)">
    </app-admin-activity-tab>

    <app-admin-admins-tab
      *ngIf="activeTab === 'admins'"
      [adminUsers]="adminUsers"
      [selectedAdminUserId]="selectedAdminUserId"
      [currentAdminId]="currentAdminId"
      [adminUserForm]="adminUserForm"
      (adminUserSelected)="selectAdminUser($event)"
      (newAdminUserStarted)="startNewAdminUser()"
      (adminUserSaved)="saveAdminUser()"
      (adminUserDeleted)="deleteAdminUser()">
    </app-admin-admins-tab>

    <app-admin-messages-tab
      *ngIf="activeTab === 'messages'"
      [messageSearchTerm]="messageSearchTerm"
      [messageStatusFilter]="messageStatusFilter"
      [messageSourceFilter]="messageSourceFilter"
      [messageSourceOptions]="messageSourceOptions"
      [filteredMessages]="filteredMessages"
      [filteredMessageCount]="filteredMessageCount"
      [unreadFilteredMessageCount]="unreadFilteredMessageCount"
      [updatingMessageIds]="updatingMessageIds"
      (messageSearchTermChange)="messageSearchTerm = $event"
      (messageStatusFilterChange)="messageStatusFilter = $event"
      (messageSourceFilterChange)="messageSourceFilter = $event"
      (messageReadToggleRequested)="toggleMessageRead($event)">
    </app-admin-messages-tab>
  </ng-container>
</div>
