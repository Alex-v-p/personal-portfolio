<div class="mx-auto max-w-4xl space-y-6">
  <div class="space-y-2 text-sm text-stone-600">
    <p>Home &gt; Blogs &gt; {{ post.title }}</p>
    <a routerLink="/blog" class="inline-flex items-center gap-2 transition hover:text-stone-950">← Back to Blog</a>
  </div>

  <article class="space-y-6">
    <header class="space-y-4">
      <h1 class="text-4xl font-semibold tracking-tight text-stone-950 sm:text-5xl">{{ post.title }}</h1>
      <div class="flex flex-wrap items-center gap-4 text-sm text-stone-500">
        <span>{{ post.date }}</span>
        <span>{{ post.readTime }}</span>
      </div>
      <div class="flex flex-wrap gap-2">
        <app-ui-chip *ngFor="let tag of post.tags">{{ tag }}</app-ui-chip>
      </div>
      <div class="flex items-center gap-3 text-sm text-stone-600">
        <span>Share:</span>
        <span
          *ngFor="let mark of shareMarks"
          class="inline-flex h-8 w-8 items-center justify-center rounded-sm bg-stone-300 text-xs font-semibold uppercase text-stone-700"
        >
          {{ mark }}
        </span>
      </div>
    </header>

    <div class="overflow-hidden rounded-[1.25rem] border border-stone-300 bg-white shadow-[0_12px_30px_rgba(40,31,20,0.08)]">
      <div class="min-h-[24rem] bg-stone-600"></div>

      <div class="space-y-6 px-6 py-8 sm:px-8">
        <div class="space-y-4">
          <p *ngFor="let paragraph of post.intro" class="text-sm leading-7 text-stone-600">
            {{ paragraph }}
          </p>
        </div>

        <section *ngFor="let section of post.sections" class="space-y-4 border-t border-stone-200 pt-6 first:border-t-0 first:pt-0">
          <h2 class="text-3xl font-semibold tracking-tight text-stone-950">{{ section.heading }}</h2>
          <p *ngFor="let paragraph of section.paragraphs" class="text-sm leading-7 text-stone-600">
            {{ paragraph }}
          </p>
        </section>
      </div>
    </div>
  </article>
</div>
