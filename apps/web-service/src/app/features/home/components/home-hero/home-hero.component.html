<section class="grid items-center gap-10 lg:grid-cols-[1.05fr_0.95fr] lg:gap-14">
  <div class="space-y-6">
    <div class="space-y-3">
      <span class="inline-flex rounded-full border border-stone-300 bg-white px-3 py-1 text-xs font-semibold text-stone-700">{{ profile.location }}</span>
      <p class="text-sm font-medium text-stone-500">{{ profile.greeting }}</p>
      <h1 class="max-w-xl text-4xl font-semibold leading-tight tracking-tight text-stone-950 sm:text-5xl lg:text-[3.4rem] lg:leading-[1.04]">
        {{ profile.heroTitle }}
      </h1>
      <p class="max-w-2xl text-base leading-7 text-stone-600">
        {{ profile.summary }}
      </p>
    </div>

    <div class="space-y-3">
      <p class="text-sm font-semibold text-stone-700">My Skills:</p>
      <div class="flex flex-wrap gap-2">
        <app-ui-chip *ngFor="let skill of profile.skills">{{ skill }}</app-ui-chip>
      </div>
    </div>

    <div class="flex flex-wrap gap-2">
      <app-ui-chip *ngFor="let label of profile.availability" tone="accent">{{ label }}</app-ui-chip>
    </div>

    <div class="flex flex-wrap gap-3">
      <app-ui-link-button
        *ngFor="let action of profile.heroActions"
        [appearance]="action.appearance"
        [href]="action.href ?? null"
        [routerLink]="action.routerLink ?? '/'"
        [openInNewTab]="action.openInNewTab ?? false"
      >
        {{ action.label }}
      </app-ui-link-button>
    </div>
  </div>

  <div class="mx-auto w-full max-w-md">
    <div class="relative mx-auto aspect-[4/5] w-full max-w-sm overflow-hidden rounded-[1.75rem] border border-stone-300 bg-stone-300/85 shadow-[0.8rem_0.8rem_0_rgba(87,83,78,0.28),1.35rem_1.35rem_0_rgba(87,83,78,0.14)]">
      <img *ngIf="profile.heroImageUrl || profile.avatarUrl; else heroFallback" [src]="profile.heroImageUrl || profile.avatarUrl" [alt]="profile.name || 'Profile image'" loading="eager" decoding="async" class="absolute inset-0 h-full w-full object-cover" />
      <ng-template #heroFallback>
        <div class="absolute inset-4 rounded-[1.4rem] border border-stone-400/60 bg-gradient-to-br from-stone-200 to-stone-300/70"></div>
        <div class="absolute inset-x-8 bottom-8 top-8 rounded-[1.2rem] border border-dashed border-stone-500/40 bg-white/20"></div>
      </ng-template>
      <div class="absolute left-8 top-8 rounded-full border border-white/70 bg-white/85 px-3 py-1 text-xs font-semibold text-stone-700">
        {{ profile.firstName }} {{ profile.lastName }}
      </div>
      <div class="absolute bottom-8 left-8 right-8 rounded-3xl border border-white/70 bg-white/80 p-4 backdrop-blur">
        <p class="text-sm font-semibold text-stone-900">{{ profile.headline }}</p>
        <p class="mt-1 text-xs leading-5 text-stone-600">{{ profile.shortBio }}</p>
      </div>
    </div>

    <div class="mt-6 flex justify-end gap-3">
      <a *ngIf="profile.resumeUrl" [href]="profile.resumeUrl" target="_blank" rel="noreferrer noopener" class="inline-flex h-10 min-w-10 items-center justify-center rounded-md bg-stone-300 px-3 text-xs font-semibold text-stone-600">CV</a>
      <span class="inline-flex h-10 w-10 items-center justify-center rounded-md bg-stone-300 text-xs font-semibold text-stone-600">UX</span>
    </div>
  </div>
</section>
