services:
  web:
    build:
      context: ./apps/web-service
      dockerfile: Dockerfile
    container_name: portfolio_web
    ports:
      - "${WEB_PORT:-4200}:4200"
    volumes:
      - ./apps/web-service:/app
      - /app/node_modules
    depends_on:
      - portfolio-api
      - assistant

  portfolio-api:
    build:
      context: ./apps/portfolio-api-service
      dockerfile: Dockerfile
    container_name: portfolio_api
    ports:
      - "${PORTFOLIO_API_PORT:-8011}:8011"
    env_file:
      - .env
    environment:
      APP_HOST: ${PORTFOLIO_API_HOST:-0.0.0.0}
      APP_PORT: ${PORTFOLIO_API_PORT:-8011}
      DATABASE_URL: ${PORTFOLIO_API_DB_URL:-postgresql+psycopg://portfolio_user:portfolio_pass@postgres:5432/portfolio_platform}
      REDIS_URL: ${PORTFOLIO_API_REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY: ${PORTFOLIO_API_SECRET_KEY:-change-me}
      CORS_ALLOWED_ORIGINS: ${PORTFOLIO_API_CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://127.0.0.1:4200}
      DB_AUTO_CREATE: ${PORTFOLIO_API_DB_AUTO_CREATE:-true}
      DB_AUTO_SEED: ${PORTFOLIO_API_DB_AUTO_SEED:-true}
      DB_STARTUP_GRACEFUL: ${PORTFOLIO_API_DB_STARTUP_GRACEFUL:-true}
      DB_RECREATE_ON_DRIFT: ${DB_RECREATE_ON_DRIFT:-true}
      MEDIA_PUBLIC_BASE_URL: ${MEDIA_PUBLIC_BASE_URL:-http://localhost:9000}
    volumes:
      - ./apps/portfolio-api-service:/app
    depends_on:
      - postgres
      - redis
      - minio
      - minio-init

  assistant:
    build:
      context: ./apps/assistant-service
      dockerfile: Dockerfile
    container_name: assistant_api
    ports:
      - "${ASSISTANT_API_PORT:-8012}:8012"
    env_file:
      - .env
    environment:
      APP_HOST: ${ASSISTANT_API_HOST:-0.0.0.0}
      APP_PORT: ${ASSISTANT_API_PORT:-8012}
      DATABASE_URL: ${ASSISTANT_API_DB_URL:-postgresql+psycopg://portfolio_user:portfolio_pass@postgres:5432/portfolio_platform}
      REDIS_URL: ${ASSISTANT_API_REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY: ${ASSISTANT_API_SECRET_KEY:-change-me-too}
    volumes:
      - ./apps/assistant-service:/app
    depends_on:
      - postgres
      - redis

  postgres:
    image: pgvector/pgvector:pg16
    container_name: portfolio_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-portfolio_platform}
      POSTGRES_USER: ${POSTGRES_USER:-portfolio_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portfolio_pass}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: portfolio_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"

  minio:
    image: minio/minio:latest
    container_name: portfolio_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-portfolioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-portfoliosecret}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: portfolio_minio_init
    depends_on:
      - minio
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-portfolioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-portfoliosecret}
      MINIO_PUBLIC_BUCKET: ${MINIO_PUBLIC_BUCKET:-portfolio}
      MINIO_SEED_DIR: /seed
    entrypoint: ["/bin/sh", "/init/init-public-bucket.sh"]
    volumes:
      - ./infra/minio:/init:ro
      - ./infra/minio/seed:/seed:ro

  nginx:
    image: nginx:1.27-alpine
    container_name: portfolio_nginx
    profiles: ["proxy"]
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - portfolio-api
      - assistant

volumes:
  postgres_data:
  minio_data:
