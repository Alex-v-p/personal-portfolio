services:
  portfolio-db-init:
    build:
      context: .
      dockerfile: infra/postgres/bootstrap/Dockerfile
    container_name: portfolio_db_init
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: ${PORTFOLIO_API_DB_URL:-postgresql+psycopg://portfolio_user:portfolio_pass@postgres:5432/portfolio_platform}
      DB_BOOTSTRAP_SEED_MODE: ${DB_BOOTSTRAP_SEED_MODE:-if-empty}
      DB_BOOTSTRAP_RECREATE_ON_DRIFT: ${DB_BOOTSTRAP_RECREATE_ON_DRIFT:-false}
      DB_BOOTSTRAP_MAX_RETRIES: ${DB_BOOTSTRAP_MAX_RETRIES:-30}
      DB_BOOTSTRAP_RETRY_DELAY_SECONDS: ${DB_BOOTSTRAP_RETRY_DELAY_SECONDS:-2}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-admin}
      ADMIN_DISPLAY_NAME: ${ADMIN_DISPLAY_NAME:-Portfolio Admin}
      MEDIA_PUBLIC_BASE_URL: ${MEDIA_PUBLIC_BASE_URL:-http://localhost:19000}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./apps/web-service
      dockerfile: Dockerfile
    container_name: portfolio_web
    expose:
      - "80"
    depends_on:
      portfolio-api:
        condition: service_started
      assistant:
        condition: service_started
      portfolio-db-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully

  portfolio-api:
    build:
      context: ./apps/portfolio-api-service
      dockerfile: Dockerfile
    container_name: portfolio_api
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_HOST: ${PORTFOLIO_API_HOST:-0.0.0.0}
      APP_PORT: ${PORTFOLIO_API_PORT:-8011}
      DATABASE_URL: ${PORTFOLIO_API_DB_URL:-postgresql+psycopg://portfolio_user:portfolio_pass@postgres:5432/portfolio_platform}
      REDIS_URL: ${PORTFOLIO_API_REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY: ${PORTFOLIO_API_SECRET_KEY:-change-me}
      CORS_ALLOWED_ORIGINS: ${PORTFOLIO_API_CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://127.0.0.1:4200}
      MEDIA_PUBLIC_BASE_URL: ${MEDIA_PUBLIC_BASE_URL:-http://localhost:19000}
      MEDIA_STORAGE_ENDPOINT: ${MEDIA_STORAGE_ENDPOINT:-minio:9000}
      MEDIA_STORAGE_ACCESS_KEY: ${MEDIA_STORAGE_ACCESS_KEY:-minioadmin}
      MEDIA_STORAGE_SECRET_KEY: ${MEDIA_STORAGE_SECRET_KEY:-minioadmin}
      MEDIA_STORAGE_SECURE: ${MEDIA_STORAGE_SECURE:-false}
      MEDIA_PUBLIC_BUCKET: ${MEDIA_PUBLIC_BUCKET:-portfolio}
      MEDIA_MAX_UPLOAD_BYTES: ${MEDIA_MAX_UPLOAD_BYTES:-10485760}
      CONTACT_RATE_LIMIT_MAX_REQUESTS: ${PORTFOLIO_API_CONTACT_RATE_LIMIT_MAX_REQUESTS:-5}
      CONTACT_RATE_LIMIT_WINDOW_SECONDS: ${PORTFOLIO_API_CONTACT_RATE_LIMIT_WINDOW_SECONDS:-600}
      CONTACT_MAX_REQUEST_BYTES: ${PORTFOLIO_API_CONTACT_MAX_REQUEST_BYTES:-16384}
      EVENTS_RATE_LIMIT_MAX_REQUESTS: ${PORTFOLIO_API_EVENTS_RATE_LIMIT_MAX_REQUESTS:-60}
      EVENTS_RATE_LIMIT_WINDOW_SECONDS: ${PORTFOLIO_API_EVENTS_RATE_LIMIT_WINDOW_SECONDS:-60}
      EVENTS_MAX_REQUEST_BYTES: ${PORTFOLIO_API_EVENTS_MAX_REQUEST_BYTES:-65536}
      EVENTS_METADATA_MAX_ENTRIES: ${PORTFOLIO_API_EVENTS_METADATA_MAX_ENTRIES:-25}
      EVENTS_METADATA_MAX_DEPTH: ${PORTFOLIO_API_EVENTS_METADATA_MAX_DEPTH:-3}
      EVENTS_METADATA_MAX_LIST_ITEMS: ${PORTFOLIO_API_EVENTS_METADATA_MAX_LIST_ITEMS:-20}
      EVENTS_METADATA_MAX_STRING_LENGTH: ${PORTFOLIO_API_EVENTS_METADATA_MAX_STRING_LENGTH:-500}
      MEDIA_UPLOAD_RATE_LIMIT_MAX_REQUESTS: ${PORTFOLIO_API_MEDIA_UPLOAD_RATE_LIMIT_MAX_REQUESTS:-20}
      MEDIA_UPLOAD_RATE_LIMIT_WINDOW_SECONDS: ${PORTFOLIO_API_MEDIA_UPLOAD_RATE_LIMIT_WINDOW_SECONDS:-300}
      KNOWLEDGE_EMBEDDING_BACKEND: ${KNOWLEDGE_EMBEDDING_BACKEND:-ollama}
      KNOWLEDGE_EMBEDDING_MODEL: ${KNOWLEDGE_EMBEDDING_MODEL:-nomic-embed-text}
      KNOWLEDGE_EMBEDDING_BASE_URL: ${KNOWLEDGE_EMBEDDING_BASE_URL:-http://ollama:11434}
      KNOWLEDGE_EMBEDDING_API_KEY: ${KNOWLEDGE_EMBEDDING_API_KEY:-}
      KNOWLEDGE_EMBEDDING_TIMEOUT_SECONDS: ${KNOWLEDGE_EMBEDDING_TIMEOUT_SECONDS:-20}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      portfolio-db-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully


  portfolio-api-worker:
    build:
      context: ./apps/portfolio-api-service
      dockerfile: Dockerfile
    container_name: portfolio_api_worker
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: ${PORTFOLIO_API_DB_URL:-postgresql+psycopg://portfolio_user:portfolio_pass@postgres:5432/portfolio_platform}
      REDIS_URL: ${PORTFOLIO_API_REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY: ${PORTFOLIO_API_SECRET_KEY:-change-me}
      MEDIA_PUBLIC_BASE_URL: ${MEDIA_PUBLIC_BASE_URL:-http://localhost:19000}
      KNOWLEDGE_EMBEDDING_BACKEND: ${KNOWLEDGE_EMBEDDING_BACKEND:-ollama}
      KNOWLEDGE_EMBEDDING_MODEL: ${KNOWLEDGE_EMBEDDING_MODEL:-nomic-embed-text}
      KNOWLEDGE_EMBEDDING_BASE_URL: ${KNOWLEDGE_EMBEDDING_BASE_URL:-http://ollama:11434}
      KNOWLEDGE_EMBEDDING_API_KEY: ${KNOWLEDGE_EMBEDDING_API_KEY:-}
      KNOWLEDGE_EMBEDDING_TIMEOUT_SECONDS: ${KNOWLEDGE_EMBEDDING_TIMEOUT_SECONDS:-20}
      GITHUB_API_TOKEN: ${GITHUB_API_TOKEN:-}
      GITHUB_STATS_USERNAME: ${GITHUB_STATS_USERNAME:-Alex-v-p}
      GITHUB_STATS_LOOKBACK_DAYS: ${GITHUB_STATS_LOOKBACK_DAYS:-365}
    command: ["sh", "-c", "python -m app.workers.admin_tasks"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      portfolio-db-init:
        condition: service_completed_successfully
      ollama:
        condition: service_started

  assistant:
    build:
      context: ./apps/assistant-service
      dockerfile: Dockerfile
    container_name: assistant_api
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_HOST: ${ASSISTANT_API_HOST:-0.0.0.0}
      APP_PORT: ${ASSISTANT_API_PORT:-8012}
      DATABASE_URL: ${ASSISTANT_API_DB_URL:-postgresql+psycopg://portfolio_user:portfolio_pass@postgres:5432/portfolio_platform}
      REDIS_URL: ${ASSISTANT_API_REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY: ${ASSISTANT_API_SECRET_KEY:-change-me-too}
      CORS_ALLOWED_ORIGINS: ${ASSISTANT_API_CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://127.0.0.1:4200}
      ASSISTANT_PROVIDER_BACKEND: ${ASSISTANT_PROVIDER_BACKEND:-mock}
      ASSISTANT_PROVIDER_MODEL: ${ASSISTANT_PROVIDER_MODEL:-qwen2.5:3b}
      ASSISTANT_PROVIDER_BASE_URL: ${ASSISTANT_PROVIDER_BASE_URL:-http://ollama:11434}
      ASSISTANT_PROVIDER_API_KEY: ${ASSISTANT_PROVIDER_API_KEY:-}
      ASSISTANT_RETRIEVAL_CHUNK_LIMIT: ${ASSISTANT_RETRIEVAL_CHUNK_LIMIT:-5}
      ASSISTANT_RETRIEVAL_CANDIDATE_LIMIT: ${ASSISTANT_RETRIEVAL_CANDIDATE_LIMIT:-18}
      CHAT_RATE_LIMIT_MAX_REQUESTS: ${ASSISTANT_CHAT_RATE_LIMIT_MAX_REQUESTS:-12}
      CHAT_RATE_LIMIT_WINDOW_SECONDS: ${ASSISTANT_CHAT_RATE_LIMIT_WINDOW_SECONDS:-60}
      CHAT_MAX_REQUEST_BYTES: ${ASSISTANT_CHAT_MAX_REQUEST_BYTES:-16384}
      PROVIDER_REQUEST_TIMEOUT_SECONDS: ${ASSISTANT_PROVIDER_REQUEST_TIMEOUT_SECONDS:-25}
      PROVIDER_MAX_RETRIES: ${ASSISTANT_PROVIDER_MAX_RETRIES:-1}
      PROVIDER_DAILY_GENERATION_CAP: ${ASSISTANT_PROVIDER_DAILY_GENERATION_CAP:-1000}
      ASSISTANT_RETRIEVAL_EMBEDDING_BACKEND: ${ASSISTANT_RETRIEVAL_EMBEDDING_BACKEND:-ollama}
      ASSISTANT_RETRIEVAL_EMBEDDING_MODEL: ${ASSISTANT_RETRIEVAL_EMBEDDING_MODEL:-nomic-embed-text}
      ASSISTANT_RETRIEVAL_EMBEDDING_BASE_URL: ${ASSISTANT_RETRIEVAL_EMBEDDING_BASE_URL:-http://ollama:11434}
      ASSISTANT_RETRIEVAL_EMBEDDING_API_KEY: ${ASSISTANT_RETRIEVAL_EMBEDDING_API_KEY:-}
      ASSISTANT_RETRIEVAL_EMBEDDING_TIMEOUT_SECONDS: ${ASSISTANT_RETRIEVAL_EMBEDDING_TIMEOUT_SECONDS:-20}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      portfolio-db-init:
        condition: service_completed_successfully
      ollama:
        condition: service_started


  assistant-worker:
    build:
      context: ./apps/assistant-service
      dockerfile: Dockerfile
    container_name: assistant_worker
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: ${ASSISTANT_API_DB_URL:-postgresql+psycopg://portfolio_user:portfolio_pass@postgres:5432/portfolio_platform}
      REDIS_URL: ${ASSISTANT_API_REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY: ${ASSISTANT_API_SECRET_KEY:-change-me-too}
      ASSISTANT_PROVIDER_BACKEND: ${ASSISTANT_PROVIDER_BACKEND:-mock}
      ASSISTANT_PROVIDER_MODEL: ${ASSISTANT_PROVIDER_MODEL:-qwen2.5:3b}
      ASSISTANT_PROVIDER_BASE_URL: ${ASSISTANT_PROVIDER_BASE_URL:-http://ollama:11434}
      ASSISTANT_PROVIDER_API_KEY: ${ASSISTANT_PROVIDER_API_KEY:-}
      ASSISTANT_RETRIEVAL_CHUNK_LIMIT: ${ASSISTANT_RETRIEVAL_CHUNK_LIMIT:-5}
      ASSISTANT_RETRIEVAL_CANDIDATE_LIMIT: ${ASSISTANT_RETRIEVAL_CANDIDATE_LIMIT:-18}
      CHAT_RATE_LIMIT_MAX_REQUESTS: ${ASSISTANT_CHAT_RATE_LIMIT_MAX_REQUESTS:-12}
      CHAT_RATE_LIMIT_WINDOW_SECONDS: ${ASSISTANT_CHAT_RATE_LIMIT_WINDOW_SECONDS:-60}
      CHAT_MAX_REQUEST_BYTES: ${ASSISTANT_CHAT_MAX_REQUEST_BYTES:-16384}
      PROVIDER_REQUEST_TIMEOUT_SECONDS: ${ASSISTANT_PROVIDER_REQUEST_TIMEOUT_SECONDS:-25}
      PROVIDER_MAX_RETRIES: ${ASSISTANT_PROVIDER_MAX_RETRIES:-1}
      PROVIDER_DAILY_GENERATION_CAP: ${ASSISTANT_PROVIDER_DAILY_GENERATION_CAP:-1000}
      ASSISTANT_RETRIEVAL_EMBEDDING_BACKEND: ${ASSISTANT_RETRIEVAL_EMBEDDING_BACKEND:-ollama}
      ASSISTANT_RETRIEVAL_EMBEDDING_MODEL: ${ASSISTANT_RETRIEVAL_EMBEDDING_MODEL:-nomic-embed-text}
      ASSISTANT_RETRIEVAL_EMBEDDING_BASE_URL: ${ASSISTANT_RETRIEVAL_EMBEDDING_BASE_URL:-http://ollama:11434}
      ASSISTANT_RETRIEVAL_EMBEDDING_API_KEY: ${ASSISTANT_RETRIEVAL_EMBEDDING_API_KEY:-}
      ASSISTANT_RETRIEVAL_EMBEDDING_TIMEOUT_SECONDS: ${ASSISTANT_RETRIEVAL_EMBEDDING_TIMEOUT_SECONDS:-20}
    command: ["sh", "-c", "python -m app.workers.chat_tasks"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      portfolio-db-init:
        condition: service_completed_successfully
      ollama:
        condition: service_started

  ollama:
    image: ollama/ollama:latest
    container_name: portfolio_ollama
    ports:
      - "${OLLAMA_PORT:-11534}:11434"
    volumes:
      - ollama_data:/root/.ollama

  postgres:
    image: pgvector/pgvector:pg16
    container_name: portfolio_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-portfolio_platform}
      POSTGRES_USER: ${POSTGRES_USER:-portfolio_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portfolio_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portfolio_user} -d ${POSTGRES_DB:-portfolio_platform}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: portfolio_redis

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: portfolio_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-19000}:9000"
      - "${MINIO_CONSOLE_PORT:-19001}:9001"
    volumes:
      - minio_data:/data

  minio-init:
    build:
      context: .
      dockerfile: infra/minio/init/Dockerfile
    container_name: portfolio_minio_init
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_PUBLIC_BUCKET: ${MINIO_PUBLIC_BUCKET:-portfolio}
    volumes:
      - ./infra/minio/seed:/seed:ro

  nginx:
    image: nginx:1.27-alpine
    container_name: portfolio_nginx
    profiles: ["proxy"]
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web

volumes:
  postgres_data:
  minio_data:
  ollama_data:
