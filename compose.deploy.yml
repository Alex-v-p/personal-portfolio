services:
  portfolio-db-init:
    restart: "no"

  web:
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3003}:80"

  portfolio-api:
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      CORS_ALLOWED_ORIGINS: ${PORTFOLIO_API_CORS_ALLOWED_ORIGINS:-https://portfolio.example.com}
      KNOWLEDGE_EMBEDDING_BASE_URL: ${EXTERNAL_OLLAMA_BASE_URL}

  portfolio-api-worker:
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      KNOWLEDGE_EMBEDDING_BASE_URL: ${EXTERNAL_OLLAMA_BASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      portfolio-db-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully

  assistant:
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      CORS_ALLOWED_ORIGINS: ${ASSISTANT_API_CORS_ALLOWED_ORIGINS:-https://portfolio.example.com}
      ASSISTANT_PROVIDER_BASE_URL: ${EXTERNAL_OLLAMA_BASE_URL}
      ASSISTANT_RETRIEVAL_EMBEDDING_BASE_URL: ${EXTERNAL_OLLAMA_BASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      portfolio-db-init:
        condition: service_completed_successfully

  assistant-worker:
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      ASSISTANT_PROVIDER_BASE_URL: ${EXTERNAL_OLLAMA_BASE_URL}
      ASSISTANT_RETRIEVAL_EMBEDDING_BASE_URL: ${EXTERNAL_OLLAMA_BASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      portfolio-db-init:
        condition: service_completed_successfully

  postgres:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  minio:
    restart: unless-stopped

  minio-init:
    restart: "no"
